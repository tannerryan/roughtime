name: Fuzz

on:
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: Time per fuzz target (e.g. 30s, 5m, 1h)
        required: false
        default: 30s

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: make fuzz FUZZ_TIME=${{ inputs.fuzz_time }}
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus
          path: protocol/testdata/fuzz/
          if-no-files-found: ignore
          retention-days: 30
